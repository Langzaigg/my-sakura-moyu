name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC & vcpkg
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Build Detours
      run: |
        git clone https://github.com/microsoft/Detours.git
        cd Detours
        nmake
        cd ..
        mkdir filter/lib
        copy Detours/lib.X86/detours.lib filter/lib/

    - name: Download libass
      shell: pwsh
      run: |
        $url = "https://github.com/ShiftMediaProject/libass/releases/download/0.17.4/libass_0.17.4_msvc15.zip"
        Invoke-WebRequest -Uri $url -OutFile libass.zip
        Expand-Archive -Path libass.zip -DestinationPath libass_temp
        copy libass_temp/lib/x86/ass.lib filter/lib/

    - name: Build Filter
      run: |
        cd filter
        mkdir build
        cd build
        cmake -A Win32 ..
        cmake --build . --config Release

    - name: Setup vcpkg dependencies
      run: |
        vcpkg install zlib:x86-windows-static libpng:x86-windows-static

    - name: Build FPTool
      run: |
        cd fptool
        mkdir build
        cd build
        cmake -A Win32 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x86-windows-static ..
        cmake --build . --config Release

    - name: Collect Artifacts
      shell: pwsh
      run: |
        $dist = "loader"
        if (!(Test-Path $dist)) { New-Item -ItemType Directory -Path $dist }

        copy filter/build/Release/filter.dll $dist/
        copy filter/build/Release/loader.exe $dist/
        copy filter/build/Release/patch.tsv $dist/
        copy libass_temp/bin/x86/ass.dll $dist/

        copy fptool/build/Release/fptool.exe $dist/
        copy fptool/build/Release/rgba2rgb.exe $dist/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: loader
        path: loader/